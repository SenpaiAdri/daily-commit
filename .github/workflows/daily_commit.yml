name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true  # Required for push action

      - name: Update timestamp
        run: |
          echo "Last update: $(date)" > timestamp.txt

      - name: Commit changes
        run: |
          git config --local user.name "SenpaiAdri"
          git config --local user.email "adrian31dg@gmail.com"
          git add timestamp.txt
          git commit -m "Daily update: $(date)" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.11.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main