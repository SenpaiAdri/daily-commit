name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0 

      - name: Update timestamp
        run: |
          echo "Last update: $(date)" > timestamp.txt

      - name: Commit changes
        run: |
          git config --local user.name "SenpaiAdri"
          git config --local user.email "adrian31dg@gmail.com"
          git add timestamp.txt
          git commit -m "Daily update: $(date)" || echo "No changes to commit"

      - name: Push changes
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/SenpaiAdri/daily-commit.git
          git push origin main