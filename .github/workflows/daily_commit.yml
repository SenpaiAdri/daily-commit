name: Daily Commit (Randomized)

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Random run gate
        run: |
          # RANDOM returns 0–32767
          # Adjust divisor to control probability:
          # % 2 => ~12/day, % 3 => ~8/day, % 6 => ~4/day, etc.
          if [ $(( RANDOM % 3 )) -ne 0 ]; then
            echo "Skipping this run..."
            exit 0
          fi

      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update timestamp
        run: |
          echo "Last update: $(date)" > timestamp.txt

      - name: Commit changes
        run: |
          git config --local user.name "SenpaiAdri"
          git config --local user.email "adrian31dg@gmail.com"
          git add timestamp.txt
          git commit -m "Random update: $(date)" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push origin main
