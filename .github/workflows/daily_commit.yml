# temporarily disabled by zeroize
name: Daily Commit (Randomized)

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:

jobs:
  update-file:
    if: ${{ false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Decide whether to run (curvy 1–4 commits/day)
        run: |
          set -e
          # Deterministic daily target in [1,4] derived from today's date
          today=$(date -u +%Y-%m-%d)
          checksum=$(printf "%s" "$today" | cksum | awk '{print $1}')
          target=$(( (checksum % 4) + 1 ))
          echo "Daily target commits for $today (UTC): $target"

          # Count commits already made today on this branch
          commits_today=$(git log --since=00:00 --oneline | wc -l)
          echo "Commits today so far: $commits_today"

          if [ "$commits_today" -ge "$target" ]; then
            echo "Target reached ($commits_today/$target). Skipping this run."
            exit 0
          fi

      - name: Update timestamp
        run: |
          echo "Last update: $(date)" > timestamp.txt

      - name: Commit changes
        run: |
          git config --local user.name "SenpaiAdri"
          git config --local user.email "adrian31dg@gmail.com"
          git add timestamp.txt
          git commit -m "Random update: $(date)" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push origin main
